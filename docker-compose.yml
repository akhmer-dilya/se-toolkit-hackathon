version: '3.9'
services:
  db:
    image: postgres:16
    container_name: healthy-habits-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: healthy_habits
      POSTGRES_USER: healthy_user
      POSTGRES_PASSWORD: healthy_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
